<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医院后台管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">医院后台管理系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="#home" data-section="home">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="#reg" data-section="reg">患者挂号</a></li>
                    <li class="nav-item"><a class="nav-link" href="#pharmacy" data-section="pharmacy">药房管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="#charge" data-section="charge">收费结算</a></li>
                    <li class="nav-item"><a class="nav-link" href="#record" data-section="record">就诊记录</a></li>
                    <li class="nav-item"><a class="nav-link" href="#report" data-section="report">检查报告</a></li>
                    <li class="nav-item"><a class="nav-link" href="#flow" data-section="flow">完整流程演示</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- 首页 -->
        <section id="home" class="page-section">
            <div class="p-5 mb-4 bg-light rounded-3">
                <div class="container-fluid py-5">
                    <h1 class="display-5 fw-bold">医院后台管理系统</h1>
                    <p class="col-md-8 fs-4">实现挂号、就诊、开方、收费、发药、报告全流程管理。</p>
                    <button class="btn btn-primary btn-lg" onclick="loadHomeIndex()">查看患者首页</button>
                </div>
            </div>
            <div id="homeResult"></div>
        </section>

        <!-- 患者挂号 -->
        <section id="reg" class="page-section d-none">
            <h2>患者挂号</h2>
            <div class="card mb-3">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3"><input type="text" id="regName" class="form-control" placeholder="患者姓名"></div>
                        <div class="col-md-3"><input type="text" id="regPhone" class="form-control" placeholder="手机号"></div>
                        <div class="col-md-3"><input type="text" id="regDept" class="form-control" placeholder="科室（如骨科、口腔科）"></div>
                        <div class="col-md-3"><button class="btn btn-success w-100" onclick="addReg()">提交挂号</button></div>
                    </div>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <div class="input-group">
                        <input type="text" id="myRegName" class="form-control" placeholder="输入姓名查询个人挂号">
                        <button class="btn btn-outline-primary" onclick="loadMyReg()">查询</button>
                    </div>
                </div>
                <div class="col-md-6 text-end">
                    <button class="btn btn-info" onclick="loadAllReg()">查询全院挂号</button>
                </div>
            </div>
            <div id="regTable"></div>
        </section>

        <!-- 药房管理 -->
        <section id="pharmacy" class="page-section d-none">
            <h2>药房管理</h2>
            <div class="card mb-3">
                <div class="card-header">药品列表</div>
                <div class="card-body">
                    <button class="btn btn-primary mb-3" onclick="loadMedicines()">刷新药品列表</button>
                    <div id="medicineTable"></div>
                </div>
            </div>

            <div class="card mb-3">
                <div class="card-header">新增药品</div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3"><input type="text" id="medName" class="form-control" placeholder="药品名称"></div>
                        <div class="col-md-3"><input type="text" id="medSpec" class="form-control" placeholder="规格"></div>
                        <div class="col-md-2"><input type="number" id="medPrice" class="form-control" placeholder="单价" step="0.01"></div>
                        <div class="col-md-2"><input type="number" id="medStock" class="form-control" placeholder="库存"></div>
                        <div class="col-md-2"><button class="btn btn-success w-100" onclick="addMedicine()">新增药品</button></div>
                    </div>
                </div>
            </div>

            <div class="card mb-3">
                <div class="card-header">开具处方</div>
                <div class="card-body">
                    <div class="row g-3 mb-3">
                        <div class="col-md-4"><input type="text" id="presPatient" class="form-control" placeholder="患者姓名"></div>
                        <div class="col-md-4"><input type="text" id="presDoctor" class="form-control" placeholder="医生姓名"></div>
                    </div>
                    <div id="presItems">
                        <div class="row g-3 pres-item mb-2">
                            <div class="col-md-5"><select class="form-select med-select"></select></div>
                            <div class="col-md-3"><input type="number" class="form-control med-qty" placeholder="数量" min="1"></div>
                            <div class="col-md-2"><button class="btn btn-danger w-100" onclick="removePresItem(this)">删除</button></div>
                        </div>
                    </div>
                    <button class="btn btn-outline-secondary" onclick="addPresItem()">添加药品</button>
                    <button class="btn btn-primary" onclick="addPrescription()">开具处方</button>
                </div>
            </div>

            <div class="card mb-3">
                <div class="card-header">处方查询与发药</div>
                <div class="card-body">
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <div class="input-group">
                                <input type="number" id="presIdQuery" class="form-control" placeholder="处方ID">
                                <button class="btn btn-outline-primary" onclick="queryPrescription()">查询</button>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="input-group">
                                <input type="number" id="dispenseId" class="form-control" placeholder="处方ID">
                                <button class="btn btn-warning" onclick="dispense()">发药</button>
                            </div>
                        </div>
                    </div>
                    <div id="prescriptionTable"></div>
                </div>
            </div>
        </section>

        <!-- 收费结算 -->
        <section id="charge" class="page-section d-none">
            <h2>收费结算</h2>
            <div class="card mb-3">
                <div class="card-header">生成收费单</div>
                <div class="card-body">
                    <div class="input-group mb-3">
                        <input type="number" id="createChargePresId" class="form-control" placeholder="处方ID">
                        <button class="btn btn-primary" onclick="createCharge()">生成收费单</button>
                    </div>
                </div>
            </div>
            <div class="card mb-3">
                <div class="card-header">缴费/取消</div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <div class="input-group">
                                <input type="number" id="payChargeId" class="form-control" placeholder="收费单ID">
                                <button class="btn btn-success" onclick="payCharge()">缴费</button>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="input-group">
                                <input type="number" id="cancelChargeId" class="form-control" placeholder="收费单ID">
                                <button class="btn btn-danger" onclick="cancelCharge()">取消收费单</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <button class="btn btn-info mb-3" onclick="loadCharges()">刷新收费单列表</button>
            <div id="chargeTable"></div>
        </section>

        <!-- 就诊记录 -->
        <section id="record" class="page-section d-none">
            <h2>就诊记录</h2>
            <div class="card mb-3">
                <div class="card-header">根据处方生成就诊记录</div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4"><input type="number" id="recordPresId" class="form-control" placeholder="处方ID"></div>
                        <div class="col-md-6"><input type="text" id="recordDiagnosis" class="form-control" placeholder="诊断内容"></div>
                        <div class="col-md-2"><button class="btn btn-primary w-100" onclick="createRecord()">生成记录</button></div>
                    </div>
                </div>
            </div>
            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <div class="input-group">
                        <input type="number" id="recordByPresId" class="form-control" placeholder="处方ID">
                        <button class="btn btn-outline-primary" onclick="getRecordByPres()">查询</button>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="input-group">
                        <input type="datetime-local" id="recordStart" class="form-control">
                        <span class="input-group-text">至</span>
                        <input type="datetime-local" id="recordEnd" class="form-control">
                        <button class="btn btn-outline-secondary" onclick="getRecordByTime()">按时间查询</button>
                    </div>
                </div>
            </div>
            <button class="btn btn-info mb-3" onclick="loadAllRecords()">查询所有就诊记录</button>
            <div id="recordTable"></div>
        </section>

        <!-- 检查报告 -->
        <section id="report" class="page-section d-none">
            <h2>检查报告</h2>
            <div class="card mb-3">
                <div class="card-header">录入检查报告</div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3"><input type="text" id="reportPatient" class="form-control" placeholder="患者姓名"></div>
                        <div class="col-md-3"><input type="text" id="reportItem" class="form-control" placeholder="检查项目"></div>
                        <div class="col-md-4"><input type="text" id="reportContent" class="form-control" placeholder="报告内容"></div>
                        <div class="col-md-2"><button class="btn btn-primary w-100" onclick="addReport()">录入报告</button></div>
                    </div>
                </div>
            </div>
            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <div class="input-group">
                        <input type="text" id="reportByName" class="form-control" placeholder="患者姓名">
                        <button class="btn btn-outline-primary" onclick="getReportByName()">查询</button>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="input-group">
                        <input type="datetime-local" id="reportStart" class="form-control">
                        <span class="input-group-text">至</span>
                        <input type="datetime-local" id="reportEnd" class="form-control">
                        <button class="btn btn-outline-secondary" onclick="getReportByTime()">按时间查询</button>
                    </div>
                </div>
            </div>
            <button class="btn btn-info mb-3" onclick="loadAllReports()">查询全部报告</button>
            <div id="reportTable"></div>
        </section>

        <!-- 完整流程演示 -->
        <section id="flow" class="page-section d-none">
            <h2>完整业务流程演示</h2>
            <div class="card">
                <div class="card-body">
                    <p>点击按钮将自动演示：挂号 → 开方 → 生成就诊记录 → 收费 → 缴费 → 发药 → 录入报告 → 查询</p>
                    <button class="btn btn-primary btn-lg" onclick="runFullFlow()">运行完整流程</button>
                    <div id="flowResult" class="mt-3"></div>
                </div>
            </div>
        </section>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="messageModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">提示</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    <button type="button" class="btn btn-primary" id="modalConfirmBtn" style="display:none;">确认</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
